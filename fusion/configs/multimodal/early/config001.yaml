experiment_name: 'multimodal_early_fusion'
phase: 'train'

lightning:
  trainer:
    gpus: '0'
    max_epochs: 100
    lr: 0.01
    precision: 32
    auto_lr_find: false
    gradient_clip_val: 1.0
  checkpoint_callback:
    monitor: 'val/auroc'
    dirpath: './data/ckpt'
    save_last: true
    mode: 'max'
    save_top_k: 5
  early_stopping_callback:
    monitor: 'val/auroc'
    min_delta: 0.00
    patience: 20
    verbose: False
    mode: 'max'
  logger:
    logger_type: 'WandbLogger'
    save_dir: './data/logger/'
    name: 'emr_tabnet'
    project: 'precision_oncology'


data: 
  prognostic: true 
  dataset: 'multimodal'
  target: 'distant_met_5year'
  weighted_sample: false
  use_parsed_img: true

model:
  fusion: 
    type: 'EarlyFusionModel'
  emr: 
    n_d: 32
    n_a: 32
    n_steps: 8
    gamma: 1.3
    n_independent: 4
    n_shared: 4
    epsilon: 1e-15
    virtual_batch_size: 128
    momentum: 0.02
    mask_type: "sparsemax"

train: 
  batch_size: 128
  num_workers: 16
  lambda_sparse: 0.0001
  loss_fn: 
    name: 'BCEWithLogitsLoss'
  optimizer: 
    img_lr: 0.01
    emr_lr: 0.02
    name: 'Adam'
    weight_decay: 1e-6
  scheduler: 
    name: 'StepLR'
    monitor: 'val_loss'
    interval: 'epoch'
    frequency: 1
    step_size: 10
    gamma: 0.9
