program: run.py
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - "--config"
  - "./configs/multitask/all/multimodal/joint/quilt/config001.yaml"
  - "--gpus" 
  - "0"
  - "--cv_split" 
  - "1"
  - "--train"
method: bayes
metric:
  name: val/auroc.best
  goal: maximize
parameters:
  lightning.trainer.lr:
    distribution: categorical
    values:
      - 0.01
      - 0.001
      - 0.0001
  train.optimizer.img_lr:
    distribution: categorical
    values:
      - 0.01
      - 0.001
      - 0.0001
  train.optimizer.emr_lr:
    distribution: categorical
    values:
      - 0.01
      - 0.001
      - 0.0001
  model.fusion.use_batchnorm:
    distribution: categorical 
    values:
      - true
      - false
  model.fusion.num_hidden:
    distribution: categorical 
    values:
      - 0
      - 1
      - 2
      - 3
  model.dropout_prob:
    distribution: categorical 
    values:
      - 0.0
      - 0.25
      - 0.5
      - 0.75
