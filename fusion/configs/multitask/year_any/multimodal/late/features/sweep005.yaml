program: run.py
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - "--config"
  - "./configs/multitask/year_any/multimodal/late/features/config001.yaml"
  - "--gpus" 
  - "3"
  - "--cv_split" 
  - "5"
  - "--train"
method: bayes
metric:
  name: val/auroc.best
  goal: maximize
parameters:
  lightning.trainer.lr:
    distribution: categorical
    values:
      - 0.01
      - 0.001
      - 0.0001
  train.optimizer.img_lr:
    distribution: categorical
    values:
      - 0.01
      - 0.001
      - 0.0001
  train.optimizer.emr_lr:
    distribution: categorical
    values:
      - 0.01
      - 0.001
      - 0.0001
  model.fusion.aggregation_type:
    distribution: categorical 
    values:
      - 'mean'
      - 'fcnn'
  model.vision.n_neurons:
    distribution: categorical 
    values:
      - 128
      - 64
      - 32
      - 16
  model.vision.n_hidden:
    distribution: categorical 
    values:
      - 0
      - 1
      - 2
      - 3
      - 5
  model.vision.use_batchnorm:
    distribution: categorical 
    values:
      - true
      - false
  model.vision.dropout_prob:
    distribution: categorical 
    values:
      - 0.0
      - 0.25
      - 0.5
      - 0.75