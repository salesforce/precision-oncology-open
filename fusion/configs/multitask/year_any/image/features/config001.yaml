experiment_name: 'multitask_year_any_image_features_linear_model'
phase: 'training'

lightning:
  trainer:
    gpus: '0'
    #accelerator: 'dp'
    max_epochs: 150
    lr: 0.0003
    precision: 32
    auto_lr_find: false
    gradient_clip_val: 1.0
  checkpoint_callback:
    monitor: 'val/auroc'
    dirpath: './data/ckpt'
    save_last: true
    mode: 'max'
    save_top_k: 5
  early_stopping_callback:
    monitor: 'val/auroc'
    min_delta: 0.00
    patience: 10
    verbose: False
    mode: 'max'
  logger:
    logger_type: 'WandbLogger'
    save_dir: './data/logger/'
    name: 'emr_tabnet'
    project: 'precision_oncology'


data: 
  prognostic: true 
  dataset: 'image'
  target: 'year_any'
  weighted_sample: true
  use_parsed_img: true

model:
  type: 'LinearModel'
  n_neurons: 128
  n_hidden: 0
  use_batchnorm: false
  dropout_prob: 0.0
train: 
  batch_size: 32
  num_workers: 0
  lambda_sparse: 0.001
  loss_fn: 
    name: 'BCEWithLogitsLoss'
  optimizer: 
    name: 'Adam'
    weight_decay: 5e-3
  scheduler: 
    name: 'StepLR'
    monitor: 'val_loss'
    interval: 'epoch'
    frequency: 1
    step_size: 10
    gamma: 0.9
